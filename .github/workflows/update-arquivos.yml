name: Atualizar skill /arquivos

on:
  schedule:
    # Toda sexta às 21:00 UTC = 18:00 BRT (UTC-3)
    - cron: "0 21 * * 5"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm ci

      - name: Rodar script de atualização
        run: node scripts/update-arquivos.js

      - name: Verificar mudanças
        id: changes
        run: |
          git diff --quiet .claude/commands/arquivos.md \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commitar e fazer push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/commands/arquivos.md
          git commit -m "chore: atualiza skill /arquivos (sexta 18:00 BRT)"
          git push
