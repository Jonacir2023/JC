name: Importar SINAPI-MG

on:
  schedule:
    - cron: '0 6 1 * *'  # todo dia 1 do mês às 6h
  workflow_dispatch:       # permite rodar manualmente

jobs:
  importar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests openpyxl

      - name: Importar SINAPI-MG
        env:
          GITHUB_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/importar_sinapi_mg.py --csv

      - name: Commitar CSV no repositório
        env:
          GITHUB_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/Jonacir2023/JC.git
          git add sinapi_mg_industrial.csv
          git diff --staged --quiet || git commit -m "sinapi: atualiza composições MG $(date +%Y-%m)"
          git push origin main
