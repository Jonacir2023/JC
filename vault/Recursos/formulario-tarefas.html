<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Tarefa → Obsidian</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #313244;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #cba6f7;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #a6adc8;
      margin-bottom: 28px;
    }

    .row { display: flex; gap: 16px; }
    .row .field { flex: 1; }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #a6adc8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, textarea, select {
      width: 100%;
      background: #1e1e2e;
      border: 1.5px solid #45475a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #cdd6f4;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #cba6f7;
    }

    textarea { resize: vertical; min-height: 80px; }

    select option { background: #313244; }

    .prioridade-group {
      display: flex;
      gap: 10px;
    }

    .prioridade-btn {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      border: 1.5px solid #45475a;
      background: #1e1e2e;
      color: #a6adc8;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      text-align: center;
      transition: all 0.15s;
      user-select: none;
    }

    .prioridade-btn:hover { border-color: #cba6f7; color: #cdd6f4; }
    .prioridade-btn.active-baixa  { background: #a6e3a1; border-color: #a6e3a1; color: #1e1e2e; }
    .prioridade-btn.active-media  { background: #f9e2af; border-color: #f9e2af; color: #1e1e2e; }
    .prioridade-btn.active-alta   { background: #f38ba8; border-color: #f38ba8; color: #1e1e2e; }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    button[type="submit"]:hover { opacity: 0.88; }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }

    #status {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    #status.ok    { background: #a6e3a1; color: #1e1e2e; }
    #status.erro  { background: #f38ba8; color: #1e1e2e; }
    #status.info  { background: #89b4fa; color: #1e1e2e; }
  </style>
</head>
<body>
<div class="card">
  <h1>📋 Nova Tarefa</h1>
  <p class="subtitle">Enviado automaticamente para o Obsidian via N8N</p>

  <form id="form">

    <div class="row">
      <div class="field">
        <label>ID da Tarefa</label>
        <input type="text" id="id" placeholder="Ex: 001" required>
      </div>
      <div class="field">
        <label>Setor</label>
        <select id="setor" required>
          <option value="">Selecione...</option>
          <option>Suprimentos</option>
          <option>Transporte</option>
          <option>Planejamento</option>
          <option>Administração</option>
          <option>Segurança</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Assunto</label>
      <input type="text" id="assunto" placeholder="Título da tarefa" required>
    </div>

    <div class="field">
      <label>Descrição</label>
      <textarea id="descricao" placeholder="Detalhe o que precisa ser feito..."></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label>Criador</label>
        <input type="text" id="criador" placeholder="Seu nome" required>
      </div>
      <div class="field">
        <label>Responsável</label>
        <input type="text" id="responsavel" placeholder="Nome do responsável" required>
      </div>
    </div>

    <div class="field">
      <label>Prioridade</label>
      <div class="prioridade-group">
        <div class="prioridade-btn" data-valor="Baixa" onclick="selecionarPrioridade(this)">🟢 Baixa</div>
        <div class="prioridade-btn" data-valor="Média" onclick="selecionarPrioridade(this)">🟡 Média</div>
        <div class="prioridade-btn" data-valor="Alta"  onclick="selecionarPrioridade(this)">🔴 Alta</div>
      </div>
      <input type="hidden" id="prioridade">
    </div>

    <div class="row">
      <div class="field">
        <label>Data de Lançamento</label>
        <input type="date" id="data_lancamento" required>
      </div>
      <div class="field">
        <label>Previsão de Término</label>
        <input type="date" id="previsao_termino" required>
      </div>
    </div>

    <button type="submit" id="btn">Criar Tarefa no Obsidian</button>
    <div id="status"></div>

  </form>
</div>

<script>
  const WEBHOOK = 'https://jonacircazelli.app.n8n.cloud/webhook/gestao-tarefas';

  // Preenche data de hoje por padrão
  const hoje = new Date().toISOString().split('T')[0];
  document.getElementById('data_lancamento').value = hoje;

  function selecionarPrioridade(el) {
    document.querySelectorAll('.prioridade-btn').forEach(b => {
      b.classList.remove('active-baixa', 'active-media', 'active-alta');
    });
    const val = el.dataset.valor;
    el.classList.add('active-' + val.toLowerCase().replace('é','e'));
    document.getElementById('prioridade').value = val;
  }

  function mostrarStatus(msg, tipo) {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = tipo;
    s.style.display = 'block';
  }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();

    if (!document.getElementById('prioridade').value) {
      mostrarStatus('⚠️ Selecione uma prioridade.', 'erro');
      return;
    }

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    mostrarStatus('Enviando para o N8N...', 'info');

    const payload = {
      'Id':                    document.getElementById('id').value.trim(),
      'Assunto':               document.getElementById('assunto').value.trim(),
      'Descrição do Assunto':  document.getElementById('descricao').value.trim(),
      'Criador':               document.getElementById('criador').value.trim(),
      'Responsável':           document.getElementById('responsavel').value.trim(),
      'Prioridade':            document.getElementById('prioridade').value,
      'Setor':                 document.getElementById('setor').value,
      'Data de lançamento':    document.getElementById('data_lancamento').value,
      'Previsão de Término':   document.getElementById('previsao_termino').value
    };

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (res.ok) {
        mostrarStatus('✅ ' + data.mensagem, 'ok');
        document.getElementById('form').reset();
        document.querySelectorAll('.prioridade-btn').forEach(b =>
          b.classList.remove('active-baixa', 'active-media', 'active-alta'));
        document.getElementById('data_lancamento').value = hoje;
      } else {
        mostrarStatus('❌ ' + (data.mensagem || 'Erro desconhecido.'), 'erro');
      }
    } catch (err) {
      mostrarStatus('❌ Não foi possível conectar ao N8N. Verifique se o workflow está ativo.', 'erro');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Criar Tarefa no Obsidian';
    }
  });
</script>
</body>
</html>
